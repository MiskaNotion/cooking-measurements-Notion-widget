<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cooking Measurement Calculator</title>

<style>
  body {
    font-family: Inter, sans-serif;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .widget {
    background: #ffffff;
    padding: 24px;
    border-radius: 18px;
    width: 360px;
    box-shadow: 0 0 0 1px #e5e5e5;
  }

  .title {
    font-size: 14px;
    color: #777;
    margin-bottom: 10px;
  }

  .row {
    display: flex;
    gap: 14px;
  }

  .column {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .column input {
    font-size: 26px;
    padding: 10px 0;
    border: none;
    border-bottom: 1px solid #ddd;
    outline: none;
  }

  .column input[readonly] {
    color: #000;
  }

  .column select {
    margin-top: 10px;
    padding: 10px;
    border-radius: 12px;
    border: 1px solid #ddd;
    background: #fafafa;
    font-size: 14px;
  }
</style>
</head>

<body>

<div class="widget">

  <div class="title">Cooking Measurement Calculator</div>

  <div class="row">
    <div class="column">
      <input id="inputValue" type="number" placeholder="Enter">
      <select id="fromUnit"></select>
    </div>

    <div class="column">
      <input id="outputValue" type="text" readonly>
      <select id="toUnit"></select>
    </div>
  </div>

</div>

<script>
const units = {
  "Milliliters (ml)": 1,
  "Liters (l)": 1000,

  "Teaspoon (tsp)": 5,
  "Tablespoon (tbsp)": 15,
  "Fluid ounce (fl oz)": 29.5735,
  "Cup": 240,

  "Pint": 473,
  "Quart": 946,
  "Gallon": 3785
};

const from = document.getElementById("fromUnit");
const to = document.getElementById("toUnit");

Object.keys(units).forEach(unit => {
  from.innerHTML += `<option>${unit}</option>`;
  to.innerHTML += `<option>${unit}</option>`;
});

to.value = "Milliliters (ml)";

function smartRound(num) {
  if (num > 100) return Math.round(num);
  if (num > 10) return num.toFixed(1);
  return num.toFixed(2);
}

function convert() {
  const value = parseFloat(document.getElementById("inputValue").value);

  if (!value) {
    document.getElementById("outputValue").value = "";
    return;
  }

  const fromUnit = from.value;
  const toUnit = to.value;

  const ml = value * units[fromUnit];
  const result = ml / units[toUnit];

  document.getElementById("outputValue").value = smartRound(result);
}

document.querySelectorAll("input, select")
  .forEach(el => el.addEventListener("input", convert));
</script>

</body>
</html>
