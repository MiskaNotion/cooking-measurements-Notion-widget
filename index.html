<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cooking Measurement Calculator</title>

<style>
  body {
    font-family: Inter, sans-serif;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .widget {
    background: #ffffff;
    padding: 26px;
    border-radius: 22px;
    width: 460px;
    box-shadow: 0 0 0 1px #e5e5e5;
  }

  .title {
    font-size: 14px;
    color: #777;
    margin-bottom: 18px;
  }

  .row {
    display: flex;
    gap: 16px;
  }

  .column {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .value-box {
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 12px;
  }

  .value-box input {
    width: 100%;
    border: none;
    outline: none;
    font-size: 22px;
  }

  .value-box input::placeholder {
    color: #bbb;
  }

  .column select {
    margin-top: 10px;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ddd;
    background: #fafafa;
    font-size: 14px;
    width: 100%;
  }

  /* CENTERED TOGGLE */
  .toggle-wrap {
    display: flex;
    justify-content: center;
    margin-top: 20px;
  }

  .toggle {
    display: flex;
    background: #f2f2f2;
    border-radius: 999px;
    padding: 4px;
  }

  .toggle-option {
    padding: 6px 16px;
    font-size: 13px;
    border-radius: 999px;
    cursor: pointer;
    color: #666;
    transition: all 0.2s ease;
  }

  .toggle-option.active {
    background: #000;
    color: #fff;
  }
</style>
</head>

<body>

<div class="widget">

  <div class="title">Cooking Measurement Calculator</div>

  <div class="row">

    <div class="column">
      <div class="value-box">
        <input id="inputValue" type="number" placeholder="Enter amount">
      </div>
      <select id="fromUnit"></select>
    </div>

    <div class="column">
      <div class="value-box">
        <input id="outputValue" type="text" readonly placeholder="Result">
      </div>
      <select id="toUnit"></select>
    </div>

  </div>

  <!-- CENTERED TOGGLE -->
  <div class="toggle-wrap">
    <div class="toggle">
      <div class="toggle-option active" id="volumeBtn">Volume</div>
      <div class="toggle-option" id="weightBtn">Weight</div>
    </div>
  </div>

</div>

<script>
let mode = "volume";

const volumeUnits = {
  "Milliliters (ml)": 1,
  "Deciliters (dl)": 100,
  "Liters (l)": 1000,

  "Teaspoon (tsp – Metric)": 5,
  "Tablespoon (tbsp – Metric)": 15,
  "Cup (Metric – 240 ml)": 240,

  "Teaspoon (tsp – US)": 4.92892,
  "Tablespoon (tbsp – US)": 14.7868,
  "Cup (US – 236.6 ml)": 236.588,

  "Fluid ounce (fl oz)": 29.5735,
  "Pint": 473.176,
  "Quart": 946.353,
  "Gallon": 3785.41
};

const weightUnits = {
  "Grams (g)": 1,
  "Kilograms (kg)": 1000,
  "Ounces (oz)": 28.3495,
  "Pounds (lb)": 453.592
};

const from = document.getElementById("fromUnit");
const to = document.getElementById("toUnit");

function populateUnits() {
  const units = mode === "volume" ? volumeUnits : weightUnits;

  from.innerHTML = "";
  to.innerHTML = "";

  Object.keys(units).forEach(unit => {
    from.innerHTML += `<option>${unit}</option>`;
    to.innerHTML += `<option>${unit}</option>`;
  });

  to.value = Object.keys(units)[0];
}

populateUnits();

function smartRound(num) {
  if (num > 100) return Math.round(num);
  if (num > 10) return num.toFixed(1);
  return num.toFixed(2);
}

function convert() {
  const value = parseFloat(document.getElementById("inputValue").value);

  if (!value) {
    document.getElementById("outputValue").value = "";
    return;
  }

  const units = mode === "volume" ? volumeUnits : weightUnits;

  const base = value * units[from.value];
  const result = base / units[to.value];

  document.getElementById("outputValue").value = smartRound(result);
}

document.querySelectorAll("input, select")
  .forEach(el => el.addEventListener("input", convert));

document.getElementById("volumeBtn").onclick = () => {
  mode = "volume";
  document.getElementById("volumeBtn").classList.add("active");
  document.getElementById("weightBtn").classList.remove("active");
  populateUnits();
  convert();
};

document.getElementById("weightBtn").onclick = () => {
  mode = "weight";
  document.getElementById("weightBtn").classList.add("active");
  document.getElementById("volumeBtn").classList.remove("active");
  populateUnits();
  convert();
};
</script>

</body>
</html>
