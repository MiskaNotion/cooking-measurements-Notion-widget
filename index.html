<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Volume Converter</title>

<style>
  body {
    font-family: Inter, sans-serif;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .widget {
    background: #ffffff;
    padding: 18px;
    border-radius: 16px;
    width: 280px;
    box-shadow: 0 0 0 1px #e5e5e5;
  }

  input {
    width: 100%;
    padding: 10px;
    font-size: 16px;
    border: none;
    border-bottom: 1px solid #ddd;
    outline: none;
  }

  .row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  select {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
    background: #fafafa;
  }

  .result {
    margin-top: 14px;
    font-size: 16px;
    font-weight: 600;
  }
</style>
</head>

<body>

<div class="widget">
  <input id="inputValue" type="number" placeholder="Enter value">

  <div class="row">
    <select id="fromUnit"></select>
    <select id="toUnit"></select>
  </div>

  <div class="result" id="result">—</div>
</div>

<script>
const units = {
  "Milliliters (ml)": 1,
  "Liters (l)": 1000,

  "Teaspoon (tsp)": 5,
  "Tablespoon (tbsp)": 15,
  "Fluid ounce (fl oz)": 29.5735,
  "Cup": 240,

  "Pint": 473,
  "Quart": 946,
  "Gallon": 3785,

  "Cubic centimeter (cc)": 1,
  "Cubic meter (m³)": 1000000
};

// populate dropdowns
const from = document.getElementById("fromUnit");
const to = document.getElementById("toUnit");

Object.keys(units).forEach(unit => {
  from.innerHTML += `<option>${unit}</option>`;
  to.innerHTML += `<option>${unit}</option>`;
});

// default selection
to.value = "Milliliters (ml)";

function convert() {
  const value = parseFloat(document.getElementById("inputValue").value);
  if (!value) return;

  const fromUnit = from.value;
  const toUnit = to.value;

  const ml = value * units[fromUnit];
  const result = ml / units[toUnit];

  document.getElementById("result").innerText =
    result.toFixed(2) + " " + toUnit;
}

document.querySelectorAll("input, select")
  .forEach(el => el.addEventListener("input", convert));
</script>

</body>
</html>
