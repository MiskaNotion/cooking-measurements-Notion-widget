<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cooking Measurement Calculator</title>

<style>
  body {
    font-family: Inter, sans-serif;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .widget {
    background: #ffffff;
    padding: 26px;
    border-radius: 22px;
    width: 460px;
    box-shadow: 0 0 0 1px #e5e5e5;
  }

  .title {
    font-size: 14px;
    color: #777;
    margin-bottom: 10px;
  }

  /* TOGGLE */
  .mode-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }

  .mode-toggle button {
    flex: 1;
    padding: 8px;
    border-radius: 10px;
    border: 1px solid #ddd;
    background: #fafafa;
    cursor: pointer;
    font-size: 13px;
  }

  .mode-toggle button.active {
    background: #000;
    color: #fff;
    border-color: #000;
  }

  .row {
    display: flex;
    gap: 16px;
  }

  .column {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .value-box {
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 12px;
  }

  .value-box input {
    width: 100%;
    border: none;
    outline: none;
    font-size: 22px;
  }

  .value-box input::placeholder {
    color: #bbb;
  }

  .column select {
    margin-top: 10px;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ddd;
    background: #fafafa;
    font-size: 14px;
    width: 100%;
  }
</style>
</head>

<body>

<div class="widget">

  <div class="title">Cooking Measurement Calculator</div>

  <!-- NEW TOGGLE -->
  <div class="mode-toggle">
    <button id="volumeBtn" class="active">Volume</button>
    <button id="weightBtn">Weight</button>
  </div>

  <div class="row">

    <div class="column">
      <div class="value-box">
        <input id="inputValue" type="number" placeholder="Enter value">
      </div>
      <select id="fromUnit"></select>
    </div>

    <div class="column">
      <div class="value-box">
        <input id="outputValue" type="text" readonly placeholder="—">
      </div>
      <select id="toUnit"></select>
    </div>

  </div>

</div>

<script>
const units = {
  "Milliliters (ml)": 1,
  "Deciliters (dl)": 100,
  "Liters (l)": 1000,

  "Teaspoon (tsp – Metric)": 5,
  "Tablespoon (tbsp – Metric)": 15,
  "Cup (Metric – 240 ml)": 240,

  "Teaspoon (tsp – US)": 4.92892,
  "Tablespoon (tbsp – US)": 14.7868,
  "Cup (US – 236.6 ml)": 236.588,

  "Fluid ounce (fl oz)": 29.5735,
  "Pint": 473.176,
  "Quart": 946.353,
  "Gallon": 3785.41
};

const from = document.getElementById("fromUnit");
const to = document.getElementById("toUnit");

Object.keys(units).forEach(unit => {
  from.innerHTML += `<option>${unit}</option>`;
  to.innerHTML += `<option>${unit}</option>`;
});

to.value = "Milliliters (ml)";

function smartRound(num) {
  if (num > 100) return Math.round(num);
  if (num > 10) return num.toFixed(1);
  return num.toFixed(2);
}

function convert() {
  const value = parseFloat(document.getElementById("inputValue").value);

  if (!value) {
    document.getElementById("outputValue").value = "";
    return;
  }

  const ml = value * units[from.value];
  const result = ml / units[to.value];

  document.getElementById("outputValue").value = smartRound(result);
}

document.querySelectorAll("input, select")
  .forEach(el => el.addEventListener("input", convert));
</script>

</body>
</html>
